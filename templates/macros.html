{% macro render_book_form(book, genres, selected_genres, is_edit) %}
<div class="mb-3">
    <label for="title" class="form-label">Название *</label>
    <input type="text" class="form-control" id="title" name="title" value="{{ book.title or '' }}" required>
</div>
<div class="mb-3">
    <label for="short_description" class="form-label">Краткое описание *</label>
    <textarea class="form-control" id="short_description" name="short_description">{{ book.short_description or '' }}</textarea>
</div>
<div class="mb-3">
    <label for="year" class="form-label">Год *</label>
    <input type="number" class="form-control" id="year" name="year" value="{{ book.year or '' }}" required min="1000" max="2100">
</div>
<div class="mb-3">
    <label for="publisher" class="form-label">Издательство *</label>
    <input type="text" class="form-control" id="publisher" name="publisher" value="{{ book.publisher or '' }}" required>
</div>
<div class="mb-3">
    <label for="author" class="form-label">Автор *</label>
    <input type="text" class="form-control" id="author" name="author" value="{{ book.author or '' }}" required>
</div>
<div class="mb-3">
    <label for="pages" class="form-label">Объём (в страницах) *</label>
    <input type="number" class="form-control" id="pages" name="pages" value="{{ book.pages or '' }}" required min="1">
</div>
<div class="mb-3">
    <label for="genres" class="form-label">Жанры *</label>
    <select class="form-select" id="genres" name="genres" multiple required size="5">
        {% for genre in genres %}
        <option value="{{ genre.id }}" {% if genre.id in selected_genres %}selected{% endif %}>{{ genre.name }}</option>
        {% endfor %}
    </select>
</div>
{% if not is_edit %}
<div class="mb-3">
    <label for="cover" class="form-label">Обложка *</label>
    <input class="form-control" type="file" id="cover" name="cover" accept="image/*" required>
</div>
{% endif %}
{% endmacro %}
